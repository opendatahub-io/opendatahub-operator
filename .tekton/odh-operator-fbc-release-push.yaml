apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/opendatahub-io/opendatahub-operator?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    # Trigger on catalog file changes, FBC Dockerfile changes, or manual test comments
    pipelinesascode.tekton.dev/on-cel-expression: |
      (event == "push" && target_branch == "main" &&
       ("catalog/**".pathChanged() || "Dockerfiles/catalog.Dockerfile".pathChanged() ||
        ".tekton/odh-operator-fbc-release-push.yaml".pathChanged())) ||
      (event == "test-comment" && target_branch == "main")
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: opendatahub-builds
    appstudio.openshift.io/component: odh-fbc-fragment-ci
    pipelines.appstudio.openshift.io/type: build
  name: odh-operator-fbc-release-on-push
  namespace: open-data-hub-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/opendatahub/opendatahub-operator-catalog:odh-stable
  - name: dockerfile
    value: Dockerfiles/catalog.Dockerfile
  - name: path-context
    value: .
  - name: rebuild
    value: "true"
  - name: skip-checks
    value: "true"
  - name: skip-fips
    value: "true"
  - name: hermetic
    value: "false"
  - name: prefetch-input
    value: ""
  - name: image-expires-after
    value: "30d"
  - name: build-source-image
    value: "false"
  - name: buildah-format
    value: "docker"
  - name: enable-cache-proxy
    value: "false"
  - name: privileged-nested
    value: "false"
  - name: build-args-file
    value: ""
  - name: build-args
    value:
    - CATALOG_VERSION=$$VERSION$$
    - OPERATOR_VERSION=$$VERSION$$
    - BUNDLE_VERSION=odh-stable
    - BUNDLE_IMAGE=quay.io/opendatahub/opendatahub-operator-bundle:odh-stable
    - BUILD_TYPE=CI
  - name: additional-labels
    value:
    - version=$$VERSION$$
    - release=main
    - git.url={{source_url}}
    - git.commit={{revision}}
    - git.branch={{target_branch}}
  - name: build-platforms
    value:
    - linux/x86_64
  - name: build-image-index
    value: "true"
  - name: enable-slack-failure-notification
    value: "true"
  - name: pipeline-type
    value: "push"
  - name: expected-cluster
    value: ""
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/odh-konflux-central.git
    - name: revision
      value: main
    - name: pathInRepo
      value: pipeline/multi-arch-catalog-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-odh-fbc-fragment-ci
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}