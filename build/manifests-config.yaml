map:
  odh-kserve-controller:
    src: config
    dest: kserve
    git.url: https://github.com/opendatahub-io/kserve
  odh-data-science-pipelines-operator-controller:
    src: config
    dest: datasciencepipelines
  odh-kuberay-operator-controller:
    src: ray-operator/config
    dest: ray
  odh-trustyai-service-operator:
    src: config
    dest: trustyai
  odh-model-controller:
    src: config
    dest: modelcontroller
  workload-variant-autoscaler:
    src: config
    dest: wva
    git.url: https://github.com/opendatahub-io/workload-variant-autoscaler
    ref_type: branch
    branch: main
  odh-model-registry-operator:
    src: config
    dest: modelregistry
  odh-dashboard:
    src: manifests
    dest: dashboard
  odh-dashboard-operator:
    src: dashboard-operator/charts/dashboard
    dest: dashboardoperator
    type: chart
  odh-training-operator:
    src: manifests
    dest: trainingoperator
  odh-feast-module-operator:
    src: config/chart
    dest: feastoperator
    type: chart
  odh-trainer:
    src: manifests
    dest: trainer
  odh-mlflow-operator:
    src: config
    dest: mlflowoperator
  odh-maas-api:
    src: deployment
    dest: maas
  odh-spark-operator:
    src: config
    dest: sparkoperator
  odh-kserve-module-operator:
    src: kserve-module/config
    dest: kserve-module-operator
  odh-agents-operator:
    src: kagenti-operator/config
    dest: kagenti-operator
  odh-ai-gateway-operator:
    src: config
    dest: aigateway
  odh-batch-gateway-operator:
    src: config/
    dest: batch-gateway-operator
  odh-workbenches-operator:
    src: charts/operator
    dest: workbenches
    type: chart
    git.url: https://github.com/opendatahub-io/workbenches-operator
    ref_type: branch
    branch: main
  odh-mcp-lifecycle-module-operator:
    src: config
    dest: mcplifecycleoperator
  odh-ogx-module-operator:
    src: config/
    dest: ogx
