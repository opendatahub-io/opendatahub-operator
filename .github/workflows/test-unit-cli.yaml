name: Unit Tests CLI
on:
  push:
    branches:
      - main
      - rhoai
  pull_request:
      paths:
      - 'cmd/test-retry/**'
jobs:
  unit-test:
    name: Run CLI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./cmd/test-retry/go.mod

      - name: Run Unit Tests
        run: make unit-test-cli
