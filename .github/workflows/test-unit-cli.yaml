name: Unit Tests CLI
on:
  push:
    branches:
      - main
      - rhoai
  pull_request:
      paths:
      - 'cmd/test-retry/**'
jobs:
  unit-test:
    name: Run CLI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ./cmd/test-retry/go.mod

      - name: Run Unit Tests
        run: make unit-test-cli
