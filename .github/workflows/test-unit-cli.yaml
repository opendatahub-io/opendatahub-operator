name: Unit Tests CLI
on:
  push:
    branches:
      - main
      - rhoai
  pull_request:
      paths:
      - 'cmd/test-retry/**'
jobs:
  unit-test:
    name: Run CLI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ./cmd/test-retry/go.mod

      - name: Run Unit Tests
        run: make unit-test-cli
