name: Gateway Integration Tests
on:
  pull_request:
    types: [labeled, synchronize, reopened]
    branches:
      - main
    paths:
      - 'internal/controller/services/gateway/**'
      - 'api/services/**'
      - 'pkg/**'
      - 'config/**'

permissions:
  contents: read

jobs:
  gateway-integration-test:
    name: Run Gateway Integration Tests
    runs-on: ubuntu-latest
    # Only run if 'run-gateway-tests' label is present
    if: contains(github.event.pull_request.labels.*.name, 'run-gateway-tests')
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Generate manifests
        run: make manifests

      - name: Setup envtest
        run: |
          make envtest
          echo "KUBEBUILDER_ASSETS=$(./bin/setup-envtest use -p path)" >> $GITHUB_ENV

      - name: Run Gateway Integration Tests
        run: |
          go test -tags=integration -v -count=1 -timeout=30m ./internal/controller/services/gateway/...
