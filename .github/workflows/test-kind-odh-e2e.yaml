name: ODH E2E Tests in KinD cluster

on:
  pull_request_target:
    types: [opened, labeled, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  get-merge-commit:
    name: Get merge commit
    uses: ./.github/workflows/get-merge-commit.yaml

  kind-odh-e2e-tests:
    needs: get-merge-commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_BUILDER: podman
      IMG: opendatahub-operator:pr-${{ github.event.number }}
      KIND_CLUSTER_NAME: kind-odh-${{ github.event.number }}-${{ github.run_id }}-${{ github.run_attempt }}
      OPERATOR_NAMESPACE: opendatahub-operator-system
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.get-merge-commit.outputs.mergedSha }}

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Create KinD Cluster
        run: |
          make kind-create CLUSTER_NAME=${{ env.KIND_CLUSTER_NAME }}

      - name: Configure Pull Secret for cert-manager in the KinD Cluster
        run: |
          echo "Setting up Pull Secret for cert-manager..."
          # Create namespaces if they don't exist
          kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace cert-manager-operator --dry-run=client -o yaml | kubectl apply -f -

          # Create secret in both namespaces
          kubectl create secret generic ccm-pull-secret \
            --from-literal=.dockerconfigjson="$PULL_SECRET" \
            --type=kubernetes.io/dockerconfigjson \
            -n cert-manager --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic ccm-pull-secret \
            --from-literal=.dockerconfigjson="$PULL_SECRET" \
            --type=kubernetes.io/dockerconfigjson \
            -n cert-manager-operator --dry-run=client -o yaml | kubectl apply -f -

          # Create service accounts in both namespaces and patch them with the pull secret
          kubectl create serviceaccount cert-manager-sa -n cert-manager --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount cert-manager-sa -n cert-manager -p '{"imagePullSecrets": [{"name": "ccm-pull-secret"}]}'
          kubectl create serviceaccount cert-manager-operator-sa -n cert-manager-operator --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount cert-manager-operator-sa -n cert-manager-operator -p '{"imagePullSecrets": [{"name": "ccm-pull-secret"}]}'
        env:
          PULL_SECRET: ${{ secrets.PULL_SECRET }}

      - name: Build ODH Operator and Cloud Manager Images
        run: |
          make get-manifests
          make image-build

      - name: Load Images into the KinD Cluster
        run: |
          make image-kind-load

      # The ODH namespace needs to be created before the Cloud Manager is deployed, otherwise it will fail
      - name: Create ODH Namespace
        run: |
          kubectl create namespace opendatahub-operator-system --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Cloud Manager
        run: |
          make deploy-ccm-local-azure
          echo "Waiting for Cloud Manager deployment to be available..."
          kubectl wait --for=condition=Available deployment/azure-cloud-manager-operator -n opendatahub-cloudmanager-system --timeout=300s || (kubectl describe pods -n opendatahub-cloudmanager-system && exit 1)
          echo "✅ Cloud Manager is Ready!"
          kubectl apply -f config/cloudmanager/azure/samples/azurekubernetesengine_v1alpha1.yaml
          echo "Waiting for AzureKubernetesEngine default-azurekubernetesengine to be Ready..."
          kubectl wait --for=condition=Ready azurekubernetesengine/default-azurekubernetesengine --timeout=300s
          echo "✅ AzureKubernetesEngine CR is Ready!"

      - name: Deploy ODH Operator
        run: |
          make deploy-rhaii-local
          echo "Waiting for ODH deployment to be available..."
          kubectl wait --for=condition=Available deployment/opendatahub-operator-controller-manager -n ${{ env.OPERATOR_NAMESPACE }} --timeout=600s
          echo "✅ ODH is Ready!"
          kubectl apply -f config/rhaii/samples/kserve.yaml
          echo "Waiting for Kserve default-kserve to be Ready..."
          kubectl wait --for=condition=Ready kserve/default-kserve --timeout=300s
          echo "✅ Kserve CR is Ready!"

      - name: Run E2E Tests
        run: |
          make e2e-test -e E2E_TEST_CLEAN_UP_PREVIOUS_RESOURCES=false -e E2E_TEST_DEPENDANT_OPERATORS_MANAGEMENT=false -e E2E_TEST_WEBHOOK=false -e E2E_TEST_COMPONENT="kserve" -e E2E_TEST_SERVICES=false -e E2E_TEST_OPERATOR_RESILIENCE=false -e E2E_TEST_OPERATOR_V2TOV3UPGRADE=false
