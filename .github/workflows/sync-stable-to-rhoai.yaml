name: Sync Stable Branch Into Rhoai Branch

on:
  schedule:
    # Run every 2 hours, on the half hour
    - cron: '30 */2 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  sync_stable_into_rhoai:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.ODH_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.ODH_RELEASE_BOT_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.generate-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.generate-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: rhoai
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update stable commits into rhoai
        id: update_stable_into_rhoai
        run: |
          git fetch origin stable rhoai
          git merge origin/stable
          git push origin rhoai
