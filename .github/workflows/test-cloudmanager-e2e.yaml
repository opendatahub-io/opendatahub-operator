name: Cloud Manager E2E Tests
on:
  pull_request_target:
    types: [opened, labeled, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

env:
  IMG: localhost/odh-operator:e2e
  IMAGE_BUILDER: docker

jobs:
  cloud-manager-e2e:
    name: Cloud Manager E2E (${{ matrix.provider }})
    # Label gate: only runs when a maintainer adds this label, preventing
    # untrusted fork PRs from executing arbitrary code with repo secrets.
    if: contains(github.event.pull_request.labels.*.name, 'run-cloudmanager-e2e')
    runs-on: ubuntu-latest
    env:
      KIND_CLUSTER_NAME: kind-${{ matrix.provider }}
    strategy:
      fail-fast: false
      matrix:
        provider: [azure, coreweave]
    steps:
      - name: Checkout PR code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: go.mod

      - name: Create kind cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          wait: 120s

      - name: Configure pull credentials on kind nodes
        if: env.PULL_SECRET != ''
        env:
          PULL_SECRET: ${{ secrets.CCM_PULL_SECRET }}
        run: |
          for node in $(kind get nodes --name "$KIND_CLUSTER_NAME"); do
            docker exec "$node" mkdir -p /var/lib/kubelet
            docker exec -i "$node" tee /var/lib/kubelet/config.json > /dev/null <<< "$PULL_SECRET"
            docker exec "$node" systemctl restart kubelet.service
          done
          # Wait for the node to be ready again after containerd restart.
          kubectl wait --for=condition=Ready nodes --all --timeout=60s

      - name: Build operator image
        run: make image-build

      - name: Load image into kind
        run: make image-kind-load

      - name: Deploy cloud manager
        run: |
          make deploy-ccm-${{ matrix.provider }}
          DEPLOY_NAME="opendatahub-${{ matrix.provider }}-cloud-manager-operator"
          kubectl patch deployment "$DEPLOY_NAME" \
            -n opendatahub-cloudmanager-system \
            --type=json \
            -p='[{"op":"replace","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]'

      - name: Wait for cloud manager to be ready
        run: |
          kubectl rollout status deployment -n opendatahub-cloudmanager-system \
            -l control-plane=controller-manager \
            --timeout=120s

      - name: Run e2e tests
        env:
          CLOUD_MANAGER_PROVIDER: ${{ matrix.provider }}
        run: go test -v -count=1 -timeout=15m ./tests/e2e/cloudmanager/ 2>&1 | tee test.log

      - name: Collect operator logs on failure
        if: failure()
        run: |
          kubectl logs -n opendatahub-cloudmanager-system \
            -l control-plane=controller-manager \
            --tail=500 || true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-log-${{ matrix.provider }}
          path: test.log
          retention-days: 7
