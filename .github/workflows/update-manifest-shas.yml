name: Update Manifest SHAs

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-manifest-shas:
    runs-on: ubuntu-latest
    # Job only runs if the current branch reference is 'refs/heads/main'.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.ODH_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.ODH_RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Update manifest SHAs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: update-shas
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const script = require('./.github/scripts/update-manifests-commit-sha.js')
            await script({github, core})

      - name: Set up Go
        if: steps.update-shas.outputs.updates-needed == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Update cloud manager RBAC
        if: steps.update-shas.outputs.updates-needed == 'true'
        run: make update-cloudmanager-rbac

      - name: Create Pull Request
        if: steps.update-shas.outputs.updates-needed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: create-pr
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore: update manifest commit SHAs"
          title: "chore: update manifest commit SHAs"
          body: |
            This PR updates the manifest commit SHAs to the latest available commits.
          branch: sync/upgrade-manifest-shas
          delete-branch: true

      - name: Output Summary
        if: steps.update-shas.outputs.updates-needed == 'true'
        run: |
          echo "✅ Updates processed successfully"
          if [[ "${{ steps.create-pr.outputs.pull-request-operation }}" == "created" ]]; then
            echo "📋 Pull request created: ${{ steps.create-pr.outputs.pull-request-url }}"
            echo "📋 Pull request number: #${{ steps.create-pr.outputs.pull-request-number }}"
          elif [[ "${{ steps.create-pr.outputs.pull-request-operation }}" == "updated" ]]; then
            echo "📋 Pull request updated: ${{ steps.create-pr.outputs.pull-request-url }}"
          else
            echo "📋 No pull request changes needed"
          fi
