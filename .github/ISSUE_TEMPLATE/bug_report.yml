name: Bug Report
description: Report a bug in the OpenDataHub operator
title: "[Bug]: "
labels: ["kind/bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not post secrets or personal data** (tokens, passwords, keys, kubeconfigs).
        Please redact sensitive values before submitting. If this is a **security vulnerability**,
        use the private security reporting process instead of filing a public issue.

  - type: checkboxes
    id: existing-issue
    attributes:
      label: Is there an existing issue for this?
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Deploy operator with '...'
        2. Create resource '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version and platform details.
      placeholder: |
        - Operator version: (e.g., v2.20.0)
        - OpenShift/Kubernetes version: (e.g., 4.16)
        - RHOAI/ODH version: (e.g., RHOAI 2.16, ODH 2.20)
        - Cloud provider: (e.g., AWS, GCP, on-prem)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      description: Paste redacted logs/error output only. Remove tokens, credentials, keys, and personal data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: workaround
    attributes:
      label: Workaround (if any)
      description: Any temporary workaround you've found.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (screenshots, related issues, etc.).
    validations:
      required: false
