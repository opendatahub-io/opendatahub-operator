apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../webhook
- ../../certmanager

patches:
# Remove OpenShift service-ca annotations (not available on plain k8s)
- target:
    kind: Service
    name: webhook-service
  patch: |
    - op: remove
      path: /metadata/annotations/service.beta.openshift.io~1serving-cert-secret-name
    - op: remove
      path: /metadata/annotations/service.beta.openshift.io~1inject-cabundle
- target:
    kind: MutatingWebhookConfiguration
  patch: |
    - op: remove
      path: /metadata/annotations/service.beta.openshift.io~1inject-cabundle
- target:
    kind: ValidatingWebhookConfiguration
  patch: |
    - op: remove
      path: /metadata/annotations/service.beta.openshift.io~1inject-cabundle
# Add cert-manager CA injection annotations
- target:
    kind: MutatingWebhookConfiguration
  patch: |
    - op: add
      path: /metadata/annotations/cert-manager.io~1inject-ca-from
      value: $(CERTIFICATE_NAMESPACE)/$(CERTIFICATE_NAME)
- target:
    kind: ValidatingWebhookConfiguration
  patch: |
    - op: add
      path: /metadata/annotations/cert-manager.io~1inject-ca-from
      value: $(CERTIFICATE_NAMESPACE)/$(CERTIFICATE_NAME)

vars:
- name: CERTIFICATE_NAMESPACE
  objref:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
  fieldref:
    fieldpath: metadata.namespace
- name: CERTIFICATE_NAME
  objref:
    kind: Certificate
    group: cert-manager.io
    version: v1
    name: serving-cert
- name: SERVICE_NAMESPACE
  objref:
    kind: Service
    version: v1
    name: webhook-service
  fieldref:
    fieldpath: metadata.namespace
- name: SERVICE_NAME
  objref:
    kind: Service
    version: v1
    name: webhook-service
