apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rhai-cloudmanager-system

resources:
- ../manager
- ../crd
- ../rbac

patches:
- path: manager_rhoai_patch.yaml
# Rename ClusterRole
- target:
    kind: ClusterRole
    name: opendatahub-aws-cloud-manager-role
  patch: |
    - op: replace
      path: /metadata/name
      value: rhai-aws-cloud-manager-role
# Rename ClusterRoleBinding and update its roleRef
- target:
    kind: ClusterRoleBinding
    name: opendatahub-aws-cloud-manager-rolebinding
  patch: |
    - op: replace
      path: /metadata/name
      value: rhai-aws-cloud-manager-rolebinding
    - op: replace
      path: /roleRef/name
      value: rhai-aws-cloud-manager-role
