apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-cloud-manager-operator
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        env:
        - name: RHAI_OPERATOR_NAMESPACE
          value: redhat-ods-operator
        - name: RHAI_WEBHOOK_CERT_SECRET_NAME
          value: rhods-operator-controller-webhook-cert
        - name: RHAI_WEBHOOK_SERVICE_NAME
          value: rhods-operator-webhook-service
