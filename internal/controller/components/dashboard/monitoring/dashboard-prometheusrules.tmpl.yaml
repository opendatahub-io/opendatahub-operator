apiVersion: monitoring.rhobs/v1
kind: PrometheusRule
metadata:
  name: dashboard-prometheusrules
  namespace: {{.Namespace}}
spec:
  groups:
      # RHOAI 3.x uses gateway-based architecture. The data-science-gateway route in
      # openshift-ingress namespace is the actual entry point for dashboard traffic.
      # The legacy rhods-dashboard route in redhat-ods-applications exists only for
      # backward compatibility redirects and does not handle actual user traffic.
      - name: SLOs-haproxy_backend_http_responses_dashboard
        rules:
        - alert: Dashboard Gateway Error Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway {{`{{`}}$labels.route{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Error Burn Rate (5m/1h window)
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate5m{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (14.40 * (1-0.99950))
            and
            sum(haproxy_backend_http_responses_total:burnrate1h{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (14.40 * (1-0.99950))
          for: 2m
          labels:
            severity: critical
            namespace: {{.ApplicationNamespace}}
        - alert: Dashboard Gateway Error Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway {{`{{`}}$labels.route{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Error Burn Rate (30m/6h window)
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate30m{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (6.00 * (1-0.99950))
            and
            sum(haproxy_backend_http_responses_total:burnrate6h{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (6.00 * (1-0.99950))
          for: 15m
          labels:
            severity: critical
            namespace: {{.ApplicationNamespace}}
        - alert: Dashboard Gateway Error Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway {{`{{`}}$labels.route{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Error Burn Rate (2h/1d window)
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate2h{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (3.00 * (1-0.99950))
            and
            sum(haproxy_backend_http_responses_total:burnrate1d{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (3.00 * (1-0.99950))
          for: 1h
          labels:
            severity: warning
            namespace: {{.ApplicationNamespace}}
        - alert: Dashboard Gateway Error Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway {{`{{`}}$labels.route{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Error Burn Rate (6h/3d window)
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate6h{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (1.00 * (1-0.99950))
            and
            sum(haproxy_backend_http_responses_total:burnrate3d{route=~"data-science-gateway",exported_namespace="openshift-ingress"}) by (route) > (1.00 * (1-0.99950))
          for: 3h
          labels:
            severity: warning
            namespace: {{.ApplicationNamespace}}
      - name: SLOs-probe_success_dashboard
        rules:
        - alert: Dashboard Gateway Probe Success Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway probe {{`{{`}}$labels.name{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Probe Success Burn Rate (5m/1h window)
          expr: |
            sum(probe_success:burnrate5m{name=~"data-science-gateway"}) by (name) > (14.40 * (1-0.98))
            and
            sum(probe_success:burnrate1h{name=~"data-science-gateway"}) by (name) > (14.40 * (1-0.98))
          for: 2m
          labels:
            severity: critical
            namespace: {{.ApplicationNamespace}}
        - alert: Dashboard Gateway Probe Success Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway probe {{`{{`}}$labels.name{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Probe Success Burn Rate (30m/6h window)
          expr: |
            sum(probe_success:burnrate30m{name=~"data-science-gateway"}) by (name) > (6.00 * (1-0.98))
            and
            sum(probe_success:burnrate6h{name=~"data-science-gateway"}) by (name) > (6.00 * (1-0.98))
          for: 15m
          labels:
            severity: critical
            namespace: {{.ApplicationNamespace}}
        - alert: Dashboard Gateway Probe Success Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway probe {{`{{`}}$labels.name{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Probe Success Burn Rate (2h/1d window)
          expr: |
            sum(probe_success:burnrate2h{name=~"data-science-gateway"}) by (name) > (3.00 * (1-0.98))
            and
            sum(probe_success:burnrate1d{name=~"data-science-gateway"}) by (name) > (3.00 * (1-0.98))
          for: 1h
          labels:
            severity: warning
            namespace: {{.ApplicationNamespace}}
        - alert: Dashboard Gateway Probe Success Burn Rate
          annotations:
            message: 'High error budget burn for dashboard gateway probe {{`{{`}}$labels.name{{`}}`}} (current value: {{`{{`}}$value{{`}}`}} ).'
            summary: Dashboard Gateway Probe Success Burn Rate (6h/3d window)
          expr: |
            sum(probe_success:burnrate6h{name=~"data-science-gateway"}) by (name) > (1.00 * (1-0.98))
            and
            sum(probe_success:burnrate3d{name=~"data-science-gateway"}) by (name) > (1.00 * (1-0.98))
          for: 3h
          labels:
            severity: warning
            namespace: {{.ApplicationNamespace}}

      # RecordingRules for ODH Dashboard
      # Monitor the data-science-gateway route in openshift-ingress which is the actual
      # gateway entry point in RHOAI 3.x, not the redirect route in redhat-ods-applications.
      - name: SLOs - ODH Dashboard
        rules:
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress",code=~"5.."}[1d]))
            /
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress"}[1d]))
          labels:
            route: data-science-gateway
          record: haproxy_backend_http_responses_total:burnrate1d
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress",code=~"5.."}[1h]))
            /
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress"}[1h]))
          labels:
            route: data-science-gateway
          record: haproxy_backend_http_responses_total:burnrate1h
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress",code=~"5.."}[2h]))
            /
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress"}[2h]))
          labels:
            route: data-science-gateway
          record: haproxy_backend_http_responses_total:burnrate2h
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress",code=~"5.."}[30m]))
            /
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress"}[30m]))
          labels:
            route: data-science-gateway
          record: haproxy_backend_http_responses_total:burnrate30m
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress",code=~"5.."}[3d]))
            /
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress"}[3d]))
          labels:
            route: data-science-gateway
          record: haproxy_backend_http_responses_total:burnrate3d
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress",code=~"5.."}[5m]))
            /
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress"}[5m]))
          labels:
            route: data-science-gateway
          record: haproxy_backend_http_responses_total:burnrate5m
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress",code=~"5.."}[6h]))
            /
            sum(rate(haproxy_backend_http_responses_total{route="data-science-gateway",exported_namespace="openshift-ingress"}[6h]))
          labels:
            route: data-science-gateway
          record: haproxy_backend_http_responses_total:burnrate6h

        - expr: |
            1 - avg_over_time(probe_success{instance=~"data-science-gateway.*"}[1d])
          labels:
            instance: data-science-gateway
          record: probe_success:burnrate1d
        - expr: |
            1 - avg_over_time(probe_success{instance=~"data-science-gateway.*"}[1h])
          labels:
            instance: data-science-gateway
          record: probe_success:burnrate1h
        - expr: |
            1 - avg_over_time(probe_success{instance=~"data-science-gateway.*"}[2h])
          labels:
            instance: data-science-gateway
          record: probe_success:burnrate2h
        - expr: |
            1 - avg_over_time(probe_success{instance=~"data-science-gateway.*"}[30m])
          labels:
            instance: data-science-gateway
          record: probe_success:burnrate30m
        - expr: |
            1 - avg_over_time(probe_success{instance=~"data-science-gateway.*"}[3d])
          labels:
            instance: data-science-gateway
          record: probe_success:burnrate3d
        - expr: |
            1 - avg_over_time(probe_success{instance=~"data-science-gateway.*"}[5m])
          labels:
            instance: data-science-gateway
          record: probe_success:burnrate5m
        - expr: |
            1 - avg_over_time(probe_success{instance=~"data-science-gateway.*"}[6h])
          labels:
            instance: data-science-gateway
          record: probe_success:burnrate6h
