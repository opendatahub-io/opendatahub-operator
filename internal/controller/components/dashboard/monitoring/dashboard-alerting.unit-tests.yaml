rule_files:
  - dashboard-alerting.rules.yaml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: haproxy_backend_http_responses_total:burnrate2m{route="data-science-gateway"}
        values: "0x60"
      - series: haproxy_backend_http_responses_total:burnrate5m{route="data-science-gateway"}
        values: "0x60"
      - series: haproxy_backend_http_responses_total:burnrate1h{route="data-science-gateway"}
        values: "0x60"
      - series: haproxy_backend_http_responses_total:burnrate2h{route="data-science-gateway"}
        values: "0x60"
      - series: haproxy_backend_http_responses_total:burnrate6h{route="data-science-gateway"}
        values: "0x60"
      - series: haproxy_backend_http_responses_total:burnrate1d{route="data-science-gateway"}
        values: "0x60"
    alert_rule_test:
      - eval_time: 1h
        alertname: Dashboard Gateway Error Burn Rate
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: haproxy_backend_http_responses_total:burnrate5m{route="data-science-gateway"}
        values: "1+1x60"
      - series: haproxy_backend_http_responses_total:burnrate1h{route="data-science-gateway"}
        values: "1+1x60"
    alert_rule_test:
      - eval_time: 2m
        alertname: Dashboard Gateway Error Burn Rate
        exp_alerts:
          - exp_labels:
              alertname: Dashboard Gateway Error Burn Rate
              namespace: "redhat-ods-applications"
              route: "data-science-gateway"
              severity: critical
            exp_annotations:
              summary: "Dashboard Gateway Error Burn Rate (5m/1h window)"
              message: "High error budget burn for dashboard gateway data-science-gateway (current value: 3 )."

  - interval: 1m
    input_series:
      - series: haproxy_backend_http_responses_total:burnrate30m{route="data-science-gateway"}
        values: "1+1x60"
      - series: haproxy_backend_http_responses_total:burnrate6h{route="data-science-gateway"}
        values: "1+1x60"
    alert_rule_test:
      - eval_time: 15m
        alertname: Dashboard Gateway Error Burn Rate
        exp_alerts:
          - exp_labels:
              alertname: Dashboard Gateway Error Burn Rate
              namespace: "redhat-ods-applications"
              route: "data-science-gateway"
              severity: critical
            exp_annotations:
              summary: "Dashboard Gateway Error Burn Rate (30m/6h window)"
              message: "High error budget burn for dashboard gateway data-science-gateway (current value: 16 )."

  - interval: 1m
    input_series:
      - series: haproxy_backend_http_responses_total:burnrate2h{route="data-science-gateway"}
        values: "1+1x60"
      - series: haproxy_backend_http_responses_total:burnrate1d{route="data-science-gateway"}
        values: "1+1x60"
    alert_rule_test:
      - eval_time: 1h
        alertname: Dashboard Gateway Error Burn Rate
        exp_alerts:
          - exp_labels:
              alertname: Dashboard Gateway Error Burn Rate
              namespace: "redhat-ods-applications"
              route: "data-science-gateway"
              severity: warning
            exp_annotations:
              summary: "Dashboard Gateway Error Burn Rate (2h/1d window)"
              message: "High error budget burn for dashboard gateway data-science-gateway (current value: 61 )."

  # Probe success
  - interval: 1m
    input_series:
      - series: probe_success:burnrate2m{name="data-science-gateway"}
        values: "0x60"
      - series: probe_success:burnrate5m{name="data-science-gateway"}
        values: "0x60"
      - series: probe_success:burnrate1h{name="data-science-gateway"}
        values: "0x60"
      - series: probe_success:burnrate2h{name="data-science-gateway"}
        values: "0x60"
      - series: probe_success:burnrate6h{name="data-science-gateway"}
        values: "0x60"
      - series: probe_success:burnrate1d{name="data-science-gateway"}
        values: "0x60"
    alert_rule_test:
      - eval_time: 3h
        alertname: Dashboard Gateway Probe Success Burn Rate
        exp_alerts: []

  - interval: 1m
    input_series:
      - series: probe_success:burnrate5m{name="data-science-gateway"}
        values: "1+1x60"
      - series: probe_success:burnrate1h{name="data-science-gateway"}
        values: "1+1x60"
    alert_rule_test:
      - eval_time: 2m
        alertname: Dashboard Gateway Probe Success Burn Rate
        exp_alerts:
          - exp_labels:
              alertname: Dashboard Gateway Probe Success Burn Rate
              name: "data-science-gateway"
              namespace: "redhat-ods-applications"
              severity: critical
            exp_annotations:
              summary: "Dashboard Gateway Probe Success Burn Rate (5m/1h window)"
              message: "High error budget burn for dashboard gateway probe data-science-gateway (current value: 3 )."

  - interval: 1m
    input_series:
      - series: probe_success:burnrate30m{name="data-science-gateway"}
        values: "1+1x60"
      - series: probe_success:burnrate6h{name="data-science-gateway"}
        values: "1+1x60"
    alert_rule_test:
      - eval_time: 15m
        alertname: Dashboard Gateway Probe Success Burn Rate
        exp_alerts:
          - exp_labels:
              alertname: Dashboard Gateway Probe Success Burn Rate
              name: "data-science-gateway"
              namespace: "redhat-ods-applications"
              severity: critical
            exp_annotations:
              summary: "Dashboard Gateway Probe Success Burn Rate (30m/6h window)"
              message: "High error budget burn for dashboard gateway probe data-science-gateway (current value: 16 )."

  - interval: 1m
    input_series:
      - series: probe_success:burnrate2h{name="data-science-gateway"}
        values: "1+1x60"
      - series: probe_success:burnrate1d{name="data-science-gateway"}
        values: "1+1x60"
    alert_rule_test:
      - eval_time: 1h
        alertname: Dashboard Gateway Probe Success Burn Rate
        exp_alerts:
          - exp_labels:
              alertname: Dashboard Gateway Probe Success Burn Rate
              name: "data-science-gateway"
              namespace: "redhat-ods-applications"
              severity: warning
            exp_annotations:
              summary: "Dashboard Gateway Probe Success Burn Rate (2h/1d window)"
              message: "High error budget burn for dashboard gateway probe data-science-gateway (current value: 61 )."

  - interval: 1m
    input_series:
      - series: probe_success:burnrate6h{name="data-science-gateway"}
        values: "1+1x200"
      - series: probe_success:burnrate3d{name="data-science-gateway"}
        values: "1+1x200"
    alert_rule_test:
      - eval_time: 3h
        alertname: Dashboard Gateway Probe Success Burn Rate
        exp_alerts:
          - exp_labels:
              alertname: Dashboard Gateway Probe Success Burn Rate
              name: "data-science-gateway"
              namespace: "redhat-ods-applications"
              severity: warning
            exp_annotations:
              summary: "Dashboard Gateway Probe Success Burn Rate (6h/3d window)"
              message: "High error budget burn for dashboard gateway probe data-science-gateway (current value: 181 )."
