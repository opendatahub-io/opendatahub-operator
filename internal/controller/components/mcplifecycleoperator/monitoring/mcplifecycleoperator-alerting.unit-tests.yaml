rule_files:
  - mcplifecycleoperator-alerting.rules.yaml

evaluation_interval: 1m

tests:
  # Operator running
  - interval: 1m
    input_series:
      - series: up{job="MCP Lifecycle Operator"}
        values: "1"
    alert_rule_test:
      - eval_time: 2m
        alertname: MCP Lifecycle Operator is not running
        exp_alerts: []

  - interval: 1m
    input_series:
    alert_rule_test:
      - eval_time: 2m
        alertname: MCP Lifecycle Operator is not running
        exp_alerts:
          - exp_labels:
              alertname: MCP Lifecycle Operator is not running
              severity: warning
            exp_annotations:
              description: This alert fires when the MCP Lifecycle Operator is not running.
              summary: Alerting for MCP Lifecycle Operator

  - interval: 1m
    input_series:
      - series: up{job="MCP Lifecycle Operator"}
        values: "0"
    alert_rule_test:
      - eval_time: 2m
        alertname: MCP Lifecycle Operator is not running
        exp_alerts:
          - exp_labels:
              alertname: MCP Lifecycle Operator is not running
              severity: warning
              job: "MCP Lifecycle Operator"
            exp_annotations:
              description: This alert fires when the MCP Lifecycle Operator is not running.
              summary: Alerting for MCP Lifecycle Operator
