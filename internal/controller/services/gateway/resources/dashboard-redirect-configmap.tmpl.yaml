apiVersion: v1
kind: ConfigMap
metadata:
  name: {{.DashboardRedirectConfigName}}
  namespace: {{.DashboardRedirectNamespace}}
  labels:
    app: {{.DashboardRedirectName}}
    {{.PartOfLabelKey}}: {{.PartOfGatewayConfig}}
data:
  nginx.conf: |
    # For more information on configuration, see:
    #   * Official English Documentation: http://nginx.org/en/docs/
    #   * Official Russian Documentation: http://nginx.org/ru/docs/

    # RHOAIENG-56723: Use a fixed worker count instead of auto (one per CPU core)
    # to prevent OOMKill on nodes with many cores.
    worker_processes 2;
    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    # Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
    include /usr/share/nginx/modules/*.conf;

    events {
        worker_connections 1024;
    }

    http {
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   65;
        types_hash_max_size 4096;

        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;

        # Load modular configuration files from the /etc/nginx/conf.d directory.
        # See http://nginx.org/en/docs/ngx_core_module.html#include
        # for more information.
        include /opt/app-root/etc/nginx.d/*.conf;

        server {
            listen       8080 default_server;
            listen       [::]:8080 default_server;
            server_name  _;
            root         /opt/app-root/src;

            # Load configuration files for the default server block.
            include /opt/app-root/etc/nginx.default.d/*.conf;
        }

    # Settings for a TLS enabled server.
    #
    #    server {
    #        listen       443 ssl;
    #        listen       [::]:443 ssl;
    #        http2        on;
    #        server_name  _;
    #        root         /opt/app-root/src;
    #
    #        ssl_certificate "/etc/pki/nginx/server.crt";
    #        ssl_certificate_key "/etc/pki/nginx/private/server.key";
    #        ssl_session_cache shared:SSL:1m;
    #        ssl_session_timeout  10m;
    #        ssl_ciphers PROFILE=SYSTEM;
    #        ssl_prefer_server_ciphers on;
    #
    #        # Load configuration files for the default server block.
    #        include /opt/app-root/etc/nginx.default.d/*.conf;
    #    }

    }
  redirect.conf: |
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        return 301 https://{{.GatewayHostname}}$request_uri;
    }
