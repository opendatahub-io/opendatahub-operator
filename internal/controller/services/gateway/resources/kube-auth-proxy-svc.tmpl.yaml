kind: Service
apiVersion: v1
metadata:
  name: {{.KubeAuthProxyServiceName}}
  namespace: {{.GatewayNamespace}}
  labels:
    app: {{.KubeAuthProxyServiceName}}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: {{.KubeAuthProxyTLSSecret}}
spec:
  selector:
    app: {{.KubeAuthProxyServiceName}}
  ports:
    - name: https
      port: 8443
      targetPort: 8443
