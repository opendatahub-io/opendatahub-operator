apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: data-science-admingroup-maas-role
  namespace: models-as-a-service
rules:
- apiGroups:
  - maas.opendatahub.io
  resources:
  - maassubscriptions
  verbs:
  - get
  - watch
  - list
  - create
  - update
  - patch
  - delete
- apiGroups:
  - maas.opendatahub.io
  resources:
  - maasauthpolicies
  verbs:
  - get
  - watch
  - list
  - create
  - update
  - patch
  - delete
