apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: data-science-metrics-admin
  labels:
    app.kubernetes.io/managed-by: opendatahub-operator
    platform.opendatahub.io/part-of: auth
rules:
  # Grant users access to query pod metrics through the data-science-prometheus-restricted endpoint.
  # kube-rbac-proxy checks that authenticated users have this permission for the namespace
  # they're querying before proxying requests to Prometheus.
  # The 'create' verb is required by some Kubernetes metrics APIs for certain query operations.
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list", "create"]
