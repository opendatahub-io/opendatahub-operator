---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitoringstack-alertmanager-prometheus-metrics-reader
  labels:
    platform.opendatahub.io/part-of: monitoring
  {{- if .DSCI }}
  ownerReferences:
  - apiVersion: {{.DSCI.APIVersion}}
    kind: {{.DSCI.Kind}}
    name: {{.DSCI.Name}}
    uid: {{.DSCI.UID}}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: odh:prometheus-metrics-reader
subjects:
  - kind: ServiceAccount
    name: data-science-monitoringstack-alertmanager
    namespace: {{.Namespace}}
