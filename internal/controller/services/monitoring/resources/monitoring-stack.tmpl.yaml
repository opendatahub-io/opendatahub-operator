apiVersion: monitoring.rhobs/v1alpha1
kind: MonitoringStack
metadata:
  name: data-science-monitoringstack
  namespace: {{.Namespace}}
spec:
  alertmanagerConfig:
    disabled: false
  logLevel: debug
  prometheusConfig:
    enableOtlpHttpReceiver: true
    persistentVolumeClaim:
      resources:
        requests:
          storage: {{.StorageSize}}
{{- if .Replicas }}
    replicas: {{.Replicas}}
{{- end }}
  resourceSelector: {}
  resources:
    limits:
      cpu: {{.CPULimit}}
      memory: {{.MemoryLimit}}
    requests:
      cpu: {{.CPURequest}}
      memory: {{.MemoryRequest}}
  retention: {{.StorageRetention}}
