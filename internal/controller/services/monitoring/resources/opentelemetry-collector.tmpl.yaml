apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ .OpenTelemetryCollectorName }}
  namespace: {{ .Namespace}}
spec:
  mode: deployment
  observability:
    metrics:
      enableMetrics: true
  targetAllocator:
    prometheusCR:
      podMonitorSelector:
        matchExpressions:
          - key: monitoring.opendatahub.io/scrape
            operator: 'true'
      scrapeInterval: 30s
      serviceMonitorSelector:
        matchExpressions:
          - key: monitoring.opendatahub.io/scrape
            operator: 'true'
  config:
    extensions:
      bearertokenauth:
        filename: "/var/run/secrets/kubernetes.io/serviceaccount/token"
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: '{{ .PromPipelineName }}'
              scrape_interval: 30s
              scrape_timeout: 10s
              metrics_path: /metrics
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_monitoring_opendatahub_io_scrape]
                  action: keep
                  regex: true
      otlp:
        protocols:
          grpc: {}
          http: {}
    processors:
      memory_limiter:
        check_interval: 1s
        spike_limit_mib: 800
        limit_mib: 4000
      batch:
        send_batch_size: 10000
      k8sattributes: {}
      resourcedetection:
        detectors: [openshift]
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true # by default resource attributes are dropped
      {{ if .Traces }}
      otlp/odh-tempo:
        endpoint: tempo-tempo-gateway.redhat-ods-monitoring.svc:4317
        tls:
          ca_file: "/var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt"
        auth:
          authenticator: bearertokenauth
        headers:
          # must be set to the tenant name from tempo CR
          X-Scope-OrgID: redhat-ods-monitoring
      {{ end }}
    service:
      extensions: [bearertokenauth]
      pipelines:
      {{ if .Traces }}
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [otlp/odh-tempo]
      {{ end }}
        metrics:
          receivers: [prometheus, otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters: [prometheus]
