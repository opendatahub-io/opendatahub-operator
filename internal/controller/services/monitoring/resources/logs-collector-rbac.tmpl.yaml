---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{.LogsCollectorName}}-collector
  namespace: {{.Namespace}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{.LogsCollectorName}}-processor
rules:
  # Required for k8sattributes processor
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
    verbs:
      - get
      - watch
      - list
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs:
      - get
      - watch
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{.LogsCollectorName}}-processor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{.LogsCollectorName}}-processor
subjects:
  - kind: ServiceAccount
    name: {{.LogsCollectorName}}-collector
    namespace: {{.Namespace}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{.LogsCollectorName}}-loki-writer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lokistack-application-logs-writer
subjects:
  - kind: ServiceAccount
    name: {{.LogsCollectorName}}-collector
    namespace: {{.Namespace}}
