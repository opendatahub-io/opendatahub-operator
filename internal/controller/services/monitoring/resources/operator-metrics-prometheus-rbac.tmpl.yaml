# Grants the Data Science Prometheus ServiceAccount permission to discover
# Services/Endpoints/EndpointSlices in the operator namespace, so it can scrape
# the opendatahub-operator-metrics ServiceMonitor's target there.
#
# Without this, Prometheus's own RBAC (bound only within {{.Namespace}} by the
# Cluster Observability Operator) does not extend to {{.OperatorNamespace}},
# so the opendatahub-operator-metrics target is never discovered at all
# (it never even shows up as a "dropped" target).
#
# Reuses the ClusterRole auto-generated by the Cluster Observability Operator
# for the "data-science-monitoringstack" MonitoringStack's Prometheus, scoping
# it to the operator namespace via a namespace-local RoleBinding.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-science-monitoringstack-prometheus-operator-metrics-reader
  namespace: {{.OperatorNamespace}}
  labels:
    platform.opendatahub.io/part-of: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: data-science-monitoringstack-prometheus
subjects:
  - kind: ServiceAccount
    name: data-science-monitoringstack-prometheus
    namespace: {{.Namespace}}
