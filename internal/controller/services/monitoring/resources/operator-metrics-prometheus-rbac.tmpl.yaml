# Lets Prometheus discover/scrape opendatahub-operator-metrics in {{.OperatorNamespace}};
# COO's generated RBAC only covers {{.Namespace}}.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-science-monitoringstack-prometheus-operator-metrics-reader
  namespace: {{.OperatorNamespace}}
  labels:
    platform.opendatahub.io/part-of: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: data-science-monitoringstack-prometheus
subjects:
  - kind: ServiceAccount
    name: data-science-monitoringstack-prometheus
    namespace: {{.Namespace}}
