# I added this because Prometheus couldn't see the opendatahub-operator-metrics
# target at all - it wasn't even showing up as "dropped" in the targets list.
# Turns out the RBAC that the Cluster Observability Operator sets up for
# Prometheus only covers {{.Namespace}}, so it has no permission to discover
# Services/Endpoints/EndpointSlices over in {{.OperatorNamespace}}.
#
# Instead of writing a new ClusterRole, I just reused the one the Cluster
# Observability Operator already generates for the "data-science-monitoringstack"
# Prometheus, and bound it here with a namespace-local RoleBinding scoped to the
# operator namespace. That was enough to get the target discovered.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: data-science-monitoringstack-prometheus-operator-metrics-reader
  namespace: {{.OperatorNamespace}}
  labels:
    platform.opendatahub.io/part-of: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: data-science-monitoringstack-prometheus
subjects:
  - kind: ServiceAccount
    name: data-science-monitoringstack-prometheus
    namespace: {{.Namespace}}
