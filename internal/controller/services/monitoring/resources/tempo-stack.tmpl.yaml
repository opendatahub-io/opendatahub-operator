apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: {{.TempoName}}
  namespace: {{.Namespace}}
spec:
  tenants:
    mode: openshift
  storage:
    secret:
      name: {{.Secret}}
      type: {{.Backend}}
  template:
    gateway:
      enabled: true # Required for OpenShift mode
