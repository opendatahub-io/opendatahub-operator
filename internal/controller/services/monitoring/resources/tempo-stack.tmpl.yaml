apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: data-science-tempostack
  namespace: {{.Namespace}}
spec:
  tenants:
    mode: openshift
  retention:
    global:
      traces: {{.TracesRetention}} # default 90days
  storage:
    secret:
      name: {{.Secret}}
      type: {{.Backend}}
  template:
    gateway:
      enabled: true # Required for OpenShift mode
    {{- if .TempoTLSEnabled }}
    distributor:
      tls:
        enabled: true
        {{- if .TempoCertificateSecret }}
        certName: {{.TempoCertificateSecret}}
        {{- end }}
        {{- if .TempoCAConfigMap }}
        caName: {{.TempoCAConfigMap}}
        {{- end }}
    {{- end }}
