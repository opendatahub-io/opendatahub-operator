# Base admission policies that are always deployed
# These validate that monitoring label values are boolean strings
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: "monitoring-labels-values-validation"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["monitoring.coreos.com"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podmonitors", "servicemonitors"]
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  validations:
    - expression: >
        !has(object.metadata.labels) ||
        !('monitoring.opendatahub.io/scrape' in object.metadata.labels) ||
        object.metadata.labels['monitoring.opendatahub.io/scrape'] in ['true', 'false']
      message: "The label 'monitoring.opendatahub.io/scrape' must be set to 'true' or 'false'."

---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: monitoring-labels-values-validation-binding
spec:
  policyName: monitoring-labels-values-validation
  validationActions: ["Deny"]

