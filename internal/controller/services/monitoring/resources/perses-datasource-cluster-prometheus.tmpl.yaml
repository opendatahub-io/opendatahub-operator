# User Workload Monitoring (UWM) Prometheus Datasource for Perses
#
# This datasource provides access to user application metrics via the
# OpenShift User Workload Monitoring (UWM) stack's Thanos Querier.
#
# This datasource points to the UWM Thanos Querier (in openshift-user-workload-monitoring)
# which aggregates metrics from user application namespaces (MaaS metrics, etc.).
#
# PREREQUISITE: User Workload Monitoring must be enabled on the cluster:
#   enableUserWorkload: true in cluster-monitoring-config ConfigMap (openshift-monitoring namespace)
#
# The configuration uses:
# - ConfigMap-based TLS CA (prometheus-web-tls-ca with OpenShift service CA)
# - A secret for bearer token authentication to Thanos Querier
#
---
apiVersion: v1
kind: Secret
metadata:
  name: cluster-prometheus-datasource-secret
  namespace: {{.Namespace}}
  labels:
    platform.opendatahub.io/part-of: monitoring
  annotations:
    kubernetes.io/service-account.name: data-science-prometheus-cluster-proxy
type: kubernetes.io/service-account-token
---
apiVersion: perses.dev/{{.PersesAPIVersion}}
kind: PersesDatasource
metadata:
  name: cluster-prometheus-datasource
  namespace: {{.Namespace}}
  labels:
    platform.opendatahub.io/part-of: monitoring
  annotations:
    platform.opendatahub.io/description: "User application metrics via OpenShift User Workload Monitoring Thanos Querier"
spec:
  client:
    tls:
      enable: true
      caCert:
        type: configmap
        name: prometheus-web-tls-ca
        certPath: service-ca.crt
  config:
    default: true
    display:
      name: "User Workload Prometheus"
      description: "OpenShift User Workload Monitoring Thanos Querier - provides user application metrics"
    plugin:
      kind: "PrometheusDatasource"
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            # Secret contains bearer token for Thanos Querier authentication
            secret: cluster-prometheus-datasource-secret
            url: https://thanos-querier.openshift-user-workload-monitoring.svc:9091
